# Social platform configuration for the weekly posting queue.
#
# Approval model:
#   - Platforms with auto_approve: true are generated with status "approved"
#     and publish automatically on their scheduled day.
#   - Platforms with auto_approve: false are generated with status
#     "pending_review" and are skipped by the publisher until approved
#     (edit the queue file or run: python -m agents.run social.approve)

schedule:
  # Posting days (publisher workflow runs Mon/Wed/Fri)
  days: ["monday", "wednesday", "friday"]
  timezone: "America/Denver"

platforms:
  gbp:
    display_name: "Google Business Profile"
    enabled: true
    auto_approve: false          # GBP rejects posts; human review required
    posts_per_week: 3
    max_length: 1500
    optimal_length: 400
    requires_image: false
    supports_cta_button: true    # LEARN_MORE / BOOK buttons with URL
    voice: >
      Professional, factual, local. Reads like a knowledgeable Denver
      business informing a comparison shopper. No hype, no exclamation
      marks, no emojis, no hashtags, no phone numbers (GBP auto-rejects
      posts containing phone numbers), no pricing.

  instagram:
    display_name: "Instagram"
    enabled: true
    auto_approve: true
    posts_per_week: 3
    max_length: 2200
    optimal_length: 500
    requires_image: true         # IG API requires an image or video
    supports_cta_button: false
    hashtags: 8                  # appended to caption
    carousel:
      posts_per_week: 1          # one random IG post per week is a carousel
      images: 3                  # images per carousel (2-10)
    voice: >
      Warm, human, story-adjacent. Speaks to real family situations
      (expecting parents, custody questions, reunification) with empathy
      and discretion. Light emoji use OK (1-3). Link in bio reference
      instead of raw URLs.

  facebook:
    display_name: "Facebook"
    enabled: true
    auto_approve: true
    posts_per_week: 3
    max_length: 3000
    optimal_length: 600
    requires_image: false        # link posts OK; image used if available
    supports_cta_button: false
    voice: >
      Community-oriented and reassuring. Slightly longer, explains the
      "why" behind a service, answers a common question. Ends with a
      clear link to the website. Minimal emojis. Can address Denver
      metro community directly.

  threads:
    display_name: "Threads"
    enabled: true
    auto_approve: true
    posts_per_week: 3
    max_length: 500
    optimal_length: 280
    requires_image: false
    supports_cta_button: false
    voice: >
      Conversational, concise, a bit more candid. One clear thought per
      post — a myth-buster, a surprising fact, or a direct answer to a
      question people are embarrassed to ask. No hashtag stuffing
      (0-2 max). Sounds like a person, not a brand.

# Image pool for Instagram (and optionally Facebook).
# URLs must be publicly accessible (hosted on the live site).
# Add branded images to vite-milehighdna/public/social/ and deploy,
# then list them here. Generator rotates through the pool.
image_pool:
  - "https://milehighdnatesting.com/social/paternity_1.png"
  - "https://milehighdnatesting.com/social/paternity_2.png"
  - "https://milehighdnatesting.com/social/prenatal_1.png"
  - "https://milehighdnatesting.com/social/collector_1.png"
  - "https://milehighdnatesting.com/social/test_1.png"

# Behavior when image_pool is empty and platform requires_image:
# "skip" = skip that platform with a warning, "fail" = error out
missing_image_behavior: "skip"

business:
  name: "Mile High DNA Testing"
  website: "https://milehighdnatesting.com"
  booking_url: "https://milehighdnatesting.com/appointments"
  trust_signals:
    - "AABB-accredited laboratory network"
    - "Court-admissible results"
    - "Confidential, judgment-free service"
    - "Se habla español"
